<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Digital B Marketing — Post 1</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  font-family: 'Space Grotesk', sans-serif;
  background: #0a0a0a;
  color: #fff;
  overflow: hidden;
  position: relative;
}

/* Gradient orbs */
.orb1 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,45,123,0.25) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  filter: blur(60px);
}
.orb2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%);
  bottom: -50px;
  left: -50px;
  filter: blur(60px);
}

/* Grid lines */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

.content {
  position: relative;
  z-index: 2;
  padding: 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: #FF2D7B; font-size: 32px; }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 30px;
}

.tagline {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 6px;
  color: #FF2D7B;
}

h1 {
  font-size: 72px;
  font-weight: 800;
  line-height: 1.05;
  max-width: 800px;
}
h1 .highlight {
  background: linear-gradient(135deg, #FF2D7B, #00D4FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 22px;
  color: #999;
  max-width: 700px;
  line-height: 1.6;
}

.cta-row {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 10px;
}
.cta {
  background: #FF2D7B;
  color: #fff;
  padding: 18px 44px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.cta-sub {
  font-size: 16px;
  color: #666;
}

.footer-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 30px;
}
.footer-bar .handle {
  font-size: 16px;
  color: #666;
  font-weight: 500;
}
.stats {
  display: flex;
  gap: 40px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #FF2D7B, #00D4FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 11px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 4px;
}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="grid"></div>

<div class="content">
  <div class="logo">Digital<span>B</span></div>

  <div class="main">
    <div class="tagline">Business × Entertainment</div>
    <h1>Your Brand Deserves<br><span class="highlight">Bold Marketing</span></h1>
    <div class="subtitle">We build digital strategies that turn audiences into customers and artists into brands.</div>
    <div class="cta-row">
      <div class="cta">Book a Free Strategy Call</div>
      <div class="cta-sub">→ DM us "READY"</div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="handle">@digitalbmarketing</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num">24/7</div>
        <div class="stat-label">Content</div>
      </div>
      <div class="stat">
        <div class="stat-num">360°</div>
        <div class="stat-label">Strategy</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">Results</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
