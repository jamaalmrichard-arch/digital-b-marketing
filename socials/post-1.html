<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Digital Bee Marketing — Post 1</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  font-family: 'Inter', sans-serif;
  background: #1a1a1a;
  color: #fff;
  overflow: hidden;
  position: relative;
}

/* Honeycomb hex pattern */
.honeycomb-pattern {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.06;
  background-image:
    linear-gradient(30deg, #FFC107 12%, transparent 12.5%, transparent 87%, #FFC107 87.5%, #FFC107),
    linear-gradient(150deg, #FFC107 12%, transparent 12.5%, transparent 87%, #FFC107 87.5%, #FFC107),
    linear-gradient(30deg, #FFC107 12%, transparent 12.5%, transparent 87%, #FFC107 87.5%, #FFC107),
    linear-gradient(150deg, #FFC107 12%, transparent 12.5%, transparent 87%, #FFC107 87.5%, #FFC107),
    linear-gradient(60deg, #FF8F00 25%, transparent 25.5%, transparent 75%, #FF8F00 75%, #FF8F00),
    linear-gradient(60deg, #FF8F00 25%, transparent 25.5%, transparent 75%, #FF8F00 75%, #FF8F00);
  background-size: 80px 140px;
  background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
}

/* Glow orbs */
.orb1 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,193,7,0.15) 0%, transparent 70%);
  top: -120px;
  right: -80px;
  filter: blur(60px);
}
.orb2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,143,0,0.12) 0%, transparent 70%);
  bottom: -80px;
  left: -60px;
  filter: blur(60px);
}

/* Top accent bar */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 8px;
  background: linear-gradient(90deg, #FFC107, #FF8F00, #FFC107);
  z-index: 5;
}

.content {
  position: relative;
  z-index: 2;
  padding: 70px 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.bee-icon {
  font-size: 80px;
  margin-bottom: 16px;
  filter: drop-shadow(0 4px 24px rgba(255,193,7,0.4));
}

.brand-name {
  font-family: 'Poppins', sans-serif;
  font-weight: 900;
  font-size: 50px;
  letter-spacing: -1px;
  margin-bottom: 4px;
}
.brand-name .word-digital { color: #fff; }
.brand-name .word-bee { color: #FFC107; }

.brand-sub {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 28px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 10px;
  margin-bottom: 28px;
}

.divider {
  width: 100px;
  height: 4px;
  background: linear-gradient(90deg, #FFC107, #FF8F00);
  border-radius: 2px;
  margin-bottom: 32px;
}

.headline {
  font-family: 'Poppins', sans-serif;
  font-weight: 800;
  font-size: 58px;
  line-height: 1.15;
  margin-bottom: 28px;
  color: #FFC107;
  text-shadow: 0 2px 30px rgba(255,193,7,0.25);
}

.body-text {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 25px;
  color: rgba(255,255,255,0.8);
  line-height: 1.65;
  max-width: 780px;
  margin-bottom: 40px;
}

.cta-pill {
  background: linear-gradient(135deg, #FFC107, #FF8F00);
  padding: 22px 54px;
  border-radius: 60px;
  margin-bottom: 50px;
}
.cta-pill span {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 25px;
  color: #1a1a1a;
}
.cta-pill .keyword {
  background: #1a1a1a;
  color: #FFC107;
  padding: 3px 14px;
  border-radius: 6px;
  margin: 0 2px;
}

.footer {
  position: absolute;
  bottom: 38px;
  left: 0; right: 0;
  text-align: center;
}
.footer .handle {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 21px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
}

/* Decorative hexagons */
.hex {
  position: absolute;
  background: #FFC107;
  opacity: 0.05;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}
.hex-1 { width: 180px; height: 180px; top: -30px; left: -30px; }
.hex-2 { width: 140px; height: 140px; bottom: -20px; right: -20px; }
.hex-3 { width: 100px; height: 100px; top: 80px; right: -30px; }
.hex-4 { width: 120px; height: 120px; bottom: 120px; left: -40px; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="honeycomb-pattern"></div>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="hex hex-1"></div>
<div class="hex hex-2"></div>
<div class="hex hex-3"></div>
<div class="hex hex-4"></div>

<div class="content">
  <div class="bee-icon">🐝</div>
  <div class="brand-name">
    <span class="word-digital">Digital </span><span class="word-bee">Bee</span>
  </div>
  <div class="brand-sub">Marketing</div>
  <div class="divider"></div>
  <div class="headline">We Keep Your<br>Business Buzzin'</div>
  <div class="body-text">
    Social media, paid ads, branding, content creation, and PR for businesses and entertainment brands ready to make some noise. 🍯
  </div>
  <div class="cta-pill">
    <span>DM us <span class="keyword">'BUZZ'</span> to get started</span>
  </div>
</div>

<div class="footer">
  <span class="handle">@digitalbee.support</span>
</div>
</body>
</html>
